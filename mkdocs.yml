site_name: GoClub Technical Documentation
site_description: Social Networking Microservices Platform - Technical Documentation
site_author: Parliament Team

docs_dir: ./docs
site_dir: site

extra_css:          # <-- here
  - stylesheets/extra.css

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mermaid2:
      javascript: https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - System Overview:
      - Architecture: Architecture.md
      - End-to-End Flow: end_to_end_flow.md
      - Directory Structure: Directory_structrure.md
  - Core Concepts:
      - User Management: UserManagment.md
      - The requests Table: request_table.md
      - Common Library: common_lib.md
  - Services:
      - Auth:
          - API Reference: auth/auth_api.md
          - Design: auth/auth_design.md
      - User:
          - API Reference: user/user_api.md
          - Design: user/user_design.md
      - Circles:
          - API Reference: circles/circles_api.md
          - Design: circles/circles_design.md
      - Groups:
          - API Reference: groups/groups_api.md
          - Design: groups/groups_design.md
      - Events:
          - API Reference: events/events_api.md
          - Design: events/events_design.md
      - Proximity:
          - API Reference: proximity/proximity_api.md
          - Design: proximity/proximity_design.md